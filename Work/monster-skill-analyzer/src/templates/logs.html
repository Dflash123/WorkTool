{% extends "base.html" %}
{% block title %}테스트 로그{% endblock %}

{% block content %}
<div class="page-header">
  <h2>🧪 테스트 로그</h2>
  <button class="btn btn-primary" onclick="openLogModal()">+ 테스트 기록</button>
</div>

<div class="card">
  <table class="data-table" id="logTable">
    <thead>
      <tr>
        <th>날짜</th><th>몬스터</th><th>스킬</th>
        <th>유형</th><th>담당자</th><th>버전</th><th>환경</th><th>인원</th><th>메모</th>
      </tr>
    </thead>
    <tbody id="logTbody"></tbody>
  </table>
</div>

<div id="logModal" class="modal hidden">
  <div class="modal-overlay" onclick="closeLogModal()"></div>
  <div class="modal-box">
    <div class="modal-header">
      <h3>테스트 기록</h3>
      <button class="modal-close" onclick="closeLogModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="logForm">
        <div class="form-group">
          <label>대상 스킬 *</label>
          <select id="l_skill_id" class="select" required onchange="onSkillSelect()">
            <option value="">스킬 선택...</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>테스트 유형</label>
            <select id="l_test_type" class="select">
              <option value="internal">내부 테스트</option>
              <option value="live">라이브</option>
            </select>
          </div>
          <div class="form-group">
            <label>테스트 날짜</label>
            <input type="date" id="l_test_date" class="input">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>담당자 *</label>
            <input type="text" id="l_tester_name" class="input" maxlength="50">
          </div>
          <div class="form-group sm">
            <label>버전</label>
            <input type="text" id="l_test_version" class="input" maxlength="20">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>테스트 환경</label>
            <select id="l_test_environment" class="select">
              <option value="로컬">로컬</option>
              <option value="QA서버">QA서버</option>
              <option value="스테이징">스테이징</option>
              <option value="라이브">라이브</option>
            </select>
          </div>
          <div class="form-group sm">
            <label>참여 인원</label>
            <input type="number" id="l_participant_count" class="input" value="1" min="1" max="1000">
          </div>
        </div>
        <div class="form-group">
          <label>메모</label>
          <textarea id="l_notes" class="textarea" rows="3" maxlength="500"></textarea>
        </div>
        <div id="logFormErrors" class="alert alert-error hidden"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeLogModal()">취소</button>
      <button class="btn btn-primary" onclick="submitLog()">저장</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/logs.js') }}"></script>
{% endblock %}
