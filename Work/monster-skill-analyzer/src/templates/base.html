<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Monster Skill Analyzer{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

{% if session.get('logged_in') %}
<nav class="navbar">
  <div class="nav-brand">🐉 Monster Skill Analyzer</div>
  <div class="nav-links">
    <a href="{{ url_for('skills_page') }}" class="{% if request.endpoint == 'skills_page' %}active{% endif %}">스킬 입력</a>
    <a href="{{ url_for('logs_page') }}" class="{% if request.endpoint == 'logs_page' %}active{% endif %}">테스트 로그</a>
    <a href="{{ url_for('feedback_page') }}" class="{% if request.endpoint == 'feedback_page' %}active{% endif %}">체감 평가</a>
    <a href="{{ url_for('analysis_page') }}" class="{% if request.endpoint == 'analysis_page' %}active{% endif %}">분석</a>
    <a href="{{ url_for('settings_page') }}" class="{% if request.endpoint == 'settings_page' %}active{% endif %}">⚙ 설정</a>
    <a href="{{ url_for('auth_logout') }}" class="logout">로그아웃</a>
  </div>
</nav>
{% endif %}

<main class="container">
  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
